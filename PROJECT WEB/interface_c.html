<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface C - Admin Panel</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            background:#C2F2E4;
            font-family:Arial,sans-serif;
            margin:0;
            padding:20px;
        }

        .container{
            background:white;
            max-width:800px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .header-box{
            background:#EDF7BE;
            padding:20px;
            border-radius:15px;
            border:2px solid #b8c98d;
            text-align:center;
            margin-bottom:20px;
            position:relative;
        }

        h1{
            color:#35524a;
            margin:0;
            letter-spacing:2px;
        }

        .logout-btn{
            position:absolute;
            right:20px;
            top:20px;
            background:#D32F2F;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }

        .logout-btn:hover{
            background:#b02626;
        }

        .controls{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .controls button{
            flex:1;
            padding:15px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            color:white;
        }

        #btn-next{
            background:#35524a;
        }

        #btn-skip{
            background:#ff9800;
        }

        #btn-recall{
            background:#2196f3;
        }

        .current-box{
            background:#fafafa;
            padding:20px;
            border-radius:15px;
            text-align:center;
            margin-bottom:20px;
        }

        .current-box h2{
            margin:0;
            color:#555;
        }

        .current-number{
            font-size:3rem;
            color:#D32F2F;
            font-weight:bold;
            margin-top:10px;
        }

        ul{
            list-style:none;
            padding:0;
        }

        .queue-item{
            background:#fafafa;
            padding:15px;
            border-radius:10px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .item-no{
            color:#D32F2F;
            font-weight:bold;
        }

        .btn-reset{
            background:#D32F2F;
            color:white;
            border:none;
            padding:15px;
            width:100%;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            margin-top:20px;
        }

        .btn-reset:hover{
            background:#b02626;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header-box">

        <button onclick="logout()" class="logout-btn">
            Logout
        </button>

        <h1>ALAGAQ ADMIN</h1>

    </div>

    <div class="current-box">

        <h2>Currently Serving</h2>

        <div class="current-number" id="staff-current-number">
            --
        </div>

    </div>

    <div class="controls">

        <button id="btn-next">NEXT</button>

        <button id="btn-skip">SKIP</button>

        <button id="btn-recall">RECALL</button>

    </div>

    <ul id="queue-list"></ul>

    <button class="btn-reset" onclick="resetQueue()">
        RESET DAILY QUEUE
    </button>

</div>

<script>

    if(localStorage.getItem("adminLoggedIn") !== "true"){

        window.location.href = "login.html";

    }

    function updateStaffPanel(){

        const queueData =
        JSON.parse(localStorage.getItem('alagaq_queue')) || [];

        const currentNumDisplay =
        document.getElementById('staff-current-number');

        const queueListUI =
        document.getElementById('queue-list');

        if(queueData.length > 0){

            currentNumDisplay.innerText =
            queueData[0].number;

            const nextPatients =
            queueData.slice(1);

            queueListUI.innerHTML =
            nextPatients.map(p => `

                <li class="queue-item">

                    <div>
                        <span class="item-no">
                            ${p.number}
                        </span>

                        - ${p.name}
                    </div>

                    <div>
                        ${p.service}
                    </div>

                </li>

            `).join('');

        }else{

            currentNumDisplay.innerText = "--";

            queueListUI.innerHTML =
            "<p style='text-align:center;color:#888;'>Queue is empty</p>";

        }

    }

    document.getElementById('btn-next')
    .addEventListener('click', () => {

        let queueData =
        JSON.parse(localStorage.getItem('alagaq_queue')) || [];

        if(queueData.length > 0){

            queueData.shift();

            localStorage.setItem(
                'alagaq_queue',
                JSON.stringify(queueData)
            );

            updateStaffPanel();

            localStorage.setItem(
                'newItemTrigger',
                Date.now()
            );

        }

    });


    document.getElementById('btn-skip')
    .addEventListener('click', () => {

        let queueData =
        JSON.parse(localStorage.getItem('alagaq_queue')) || [];

        if(queueData.length > 0){

            const skipped = queueData.shift();

            queueData.push(skipped);

            localStorage.setItem(
                'alagaq_queue',
                JSON.stringify(queueData)
            );

            updateStaffPanel();

            localStorage.setItem(
                'newItemTrigger',
                Date.now()
            );

        }

    });


    document.getElementById('btn-recall')
    .addEventListener('click', () => {

        localStorage.setItem(
            'newItemTrigger',
            Date.now()
        );

        alert("Patient Recalled!");

    });

    function resetQueue(){

        if(confirm("Clear all queue data?")){

            localStorage.removeItem('alagaq_queue');

            localStorage.setItem('lastNumber','100');

            updateStaffPanel();

            alert("Queue Reset Successful");

        }

    }

    function logout(){

        localStorage.removeItem("adminLoggedIn");

        window.location.href = "login.html";

    }

    window.addEventListener('storage', updateStaffPanel);

    updateStaffPanel();

    setInterval(updateStaffPanel, 2000);

</script>

</body>
</html>
