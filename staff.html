<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlagaQ - Staff</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="staff-layout">

    <main class="card full-screen-card">
        <div class="card-body staff-grid">
            
            <div class="staff-controls hover-effect">
                <p class="status-text">Current Number: <strong id="staff-current-number" class="highlight-text">--</strong></p>
                <div class="button-group">
                    <button id="btn-next" class="btn action-btn hover-effect">Next</button>
                    <button id="btn-recall" class="btn action-btn hover-effect">Recall</button>
                    <button id="btn-skip" class="btn action-btn hover-effect">Skip</button>
                </div>
            </div>
            
            <div class="queue-list-container hover-effect">
                <p class="list-title">Queue List:</p>
                <ul id="queue-list" class="queue-list">
                    </ul>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
